<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Tambah Kamar</title>
    <style>
        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Modal Container */
        .modal {
            background-color: white;
            width: 90%;
            max-width: 450px;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Header */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: #111;
        }

        .close-btn {
            font-size: 24px;
            color: #666;
            cursor: pointer;
            border: none;
            background: none;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        /* Input & Select Styles */
        .form-control {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid #f0f0f0;
            border-radius: 10px;
            background-color: #f9f9f9;
            color: #333;
            outline: none;
            transition: border 0.2s;
        }

        .form-control:focus {
            border-color: #4379F2;
            background-color: #fff;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        /* Select Arrow Customization */
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
        }

        /* Action Buttons */
        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
        }

        .btn-cancel {
            background-color: transparent;
            color: #4379F2;
            border: 2px solid #4379F2;
        }

        .btn-save {
            background-color: #4379F2;
            color: white;
            border: none;
        }
        
        .btn-detele {
            background-color: #f24343;
            color: white;
            border: none;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* OVERLAY */
        .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.3);

        display: flex;
        justify-content: center;
        align-items: center;
        }

        /* BOX */
        .success-box {
        background: #eee;
        width: 300px;
        padding: 30px;
        text-align: center;
        border-radius: 12px;
        }

        /* ICON */
        .icon {
        width: 50px;
        height: 50px;
        border: 2px solid #4379F2;
        border-radius: 50%;
        color: #4379F2;

        display: flex;
        align-items: center;
        justify-content: center;

        margin: 0 auto 15px;
        font-size: 24px;
        }

        /* TEXT */
        .success-box p {
        font-size: 18px;
        font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- FORM TAMBAH KAMAR -->
    <div class="form-tambah modal">
        <div class="modal-header">
            <h2>Tambah Kamar</h2>
            <button class="close-btn">&times;</button>
        </div>

        <form>
            <div class="form-group">
                <label>Nomor Kamar</label>
                <input type="text" class="form-control" placeholder="Contoh: KM001">
            </div>

            <div class="form-group">
                <label>Tipe Kamar</label>
                <select class="form-control">
                    <option value="" disabled selected>Tipe</option>
                    <option value="standard">Standard</option>
                    <option value="deluxe">Premium</option>
                </select>
            </div>

            <div class="form-group">
                <label>Harga per Bulan</label>
                <input type="text" class="form-control" placeholder="Contoh: Rp500.000">
            </div>

            <div class="form-group">
                <label>Fasilitas Kamar</label>
                <input type="text" class="form-control" placeholder="Contoh: Lemari, WiFi, dll">
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-cancel">Batal</button>
                <button type="submit" class="btn btn-save">Simpan</button>
            </div>
        </form>
    </div>

    <!-- FORM EDIT KAMAR -->
    <div class="form-edit modal">
        <div class="modal-header">
            <h2>Edit Kamar</h2>
            <button class="close-btn">&times;</button>
        </div>

        <form>
            <div class="form-group">
                <label>Nomor Kamar</label>
                <input type="text" class="form-control" placeholder="Contoh: KM001">
            </div>

            <div class="form-group">
                <label>Tipe Kamar</label>
                <select class="form-control">
                    <option value="" disabled selected>Tipe</option>
                    <option value="standard">Standard</option>
                    <option value="deluxe">Premium</option>
                </select>
            </div>

            <div class="form-group">
                <label>Harga per Bulan</label>
                <input type="text" class="form-control" placeholder="Contoh: Rp500.000">
            </div>

            <div class="form-group">
                <label>Fasilitas Kamar</label>
                <input type="text" class="form-control" placeholder="Contoh: Lemari, WiFi, dll">
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-cancel">Batal</button>
                <button type="submit" class="btn btn-save">Simpan</button>
            </div>
        </form>
    </div>

    <!-- DETAIL KAMAR -->
    <div class="form-detail modal">
    <div class="modal-header">
        <h2>Detail Kamar</h2>
        <button class="close-btn">&times;</button>
    </div>

    <div class="form-group">
        <label>Nomor Kamar</label>
        <input type="text" class="form-control" placeholder="KM001" disabled>
    </div>

    <div class="form-group">
        <label>Tipe Kamar</label>
        <input type="text" class="form-control" placeholder="Standard" disabled>
    </div>

    <div class="form-group">
        <label>Harga per Bulan</label>
        <input type="text" class="form-control" placeholder="Contoh: Rp500.000" disabled>
    </div>

    <div class="form-group">
        <label>Fasilitas Kamar</label>
        <input type="text" class="form-control" placeholder="Contoh: Lemari, WiFi, dll" disabled>
    </div>

    <div class="modal-footer">
        <button type="submit" class="btn btn-save">Tutup</button>
    </div>

    <!-- OVERLAY DELETE KAMAR -->
    <div class="modal">
    <div class="modal-header">
        <h2>Konfirmasi Hapus</h2>
        <button class="close-btn">&times;</button>
    </div>

    <div class="modal-footer">
        <button type="submit" class="btn btn-cancel">Batal</button>
        <button type="submit" class="btn btn-detele">Hapus</button>
    </div>

</body>
</html>
